name: Auditoria de Performance e UX (Lighthouse)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando o repositorio
        uses: actions/checkout@v4

      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalando dependencias
        run: npm ci --legacy-peer-deps

      - name: Compilando o projeto (Build)
        run: npm run build

      - name: Executando Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          urls: |
            http://localhost/
            http://localhost/experiencias/convergencia-invisivel.html
          uploadArtifacts: true
          temporaryPublicStorage: true
